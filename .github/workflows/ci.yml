name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'Directory.Packages.props', 'Directory.Build.props', 'src/Directory.Build.props', 'tests/Directory.Build.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify Docker
        run: docker version

      - name: Restore
        run: dotnet restore USF.slnx /p:ContinuousIntegrationBuild=true

      - name: Build
        run: dotnet build USF.slnx --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Install coverage tools
        run: |
          dotnet tool install --global dotnet-coverage --version 18.7.0
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.5.10

      - name: Test projects
        run: |
          set -euo pipefail

          mapfile -d '' test_projects < <(find tests -name '*.Tests.csproj' -print0 | sort -z)

          if [ "${#test_projects[@]}" -eq 0 ]; then
            echo "No test projects found under ./tests."
            exit 1
          fi

          for test_project in "${test_projects[@]}"; do
            test_project_name="$(basename "$test_project" .csproj)"
            test_results_dir="artifacts/test-results/$test_project_name"

            echo "Running $test_project"
            mkdir -p "$test_results_dir"

            dotnet-coverage collect \
              "dotnet run --project \"$test_project\" --configuration Release --no-build --no-restore /p:ContinuousIntegrationBuild=true -- --results-directory \"$test_results_dir\"" \
              --output "$test_results_dir/coverage.cobertura.xml" \
              --output-format cobertura
          done

      - name: Merge coverage
        if: always()
        run: >
          reportgenerator
          "-reports:artifacts/test-results/**/coverage.cobertura.xml"
          "-targetdir:artifacts/coverage"
          "-reporttypes:Cobertura;MarkdownSummaryGithub"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: warn

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: artifacts/coverage
          if-no-files-found: warn

  coverage-comment:
    name: Coverage comment
    runs-on: ubuntu-latest
    needs: build-test
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read
      issues: write

    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage

      - name: Update pull request comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: code-coverage
          path: artifacts/coverage/SummaryGithub.md
